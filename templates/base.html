<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Family Finance — securely manage and share family financial documents with role-based access control.">
    <title>{% block title %}Smart Family Finance{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head_extra %}{% endblock %}
</head>
<body>

{% block body %}{% endblock %}

<!-- Security Overlay (tab blur) -->
<div id="security-overlay">
    <i class="bi bi-shield-lock-fill"></i>
    <h3>Content Hidden for Security</h3>
    <p>Return to this tab to continue.</p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ── Theme Engine ─────────────────────────────────── */
(function() {
    const saved = localStorage.getItem('ff-theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateToggleIcon(saved);
})();

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ff-theme', next);
    updateToggleIcon(next);
}

function updateToggleIcon(theme) {
    document.querySelectorAll('.theme-icon').forEach(el => {
        el.className = 'theme-icon bi ' + (theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill');
    });
}

/* ── Security ─────────────────────────────────────── */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) ||
        (e.ctrlKey && e.key === 'U') ||
        e.key === 'PrintScreen') {
        e.preventDefault();
    }
});

document.addEventListener('visibilitychange', function() {
    const overlay = document.getElementById('security-overlay');
    if (!overlay) return;
    if (document.visibilityState === 'hidden') {
        document.body.style.filter = 'blur(12px)';
        overlay.style.display = 'flex';
    } else {
        document.body.style.filter = 'none';
        overlay.style.display = 'none';
    }
});

/* ── Auto-dismiss alerts ───────────────────────────── */
document.querySelectorAll('.alert:not(.alert-permanent)').forEach(el => {
    setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
    }, 5000);
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
