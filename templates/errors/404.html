<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | FinSphere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    color:#e2e8f0;
  }
  .error-box {
    text-align:center;padding:3rem 2rem;max-width:480px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    backdrop-filter:blur(12px);
  }
  .error-code { font-size:6rem;font-weight:900;color:#2563eb;line-height:1; }
  .error-title { font-size:1.4rem;font-weight:700;margin:1rem 0 0.5rem; }
  .error-msg { color:#94a3b8;font-size:0.95rem;margin-bottom:2rem; }
  .btn-home {
    display:inline-flex;align-items:center;gap:0.5rem;
    background:#2563eb;color:#fff;padding:0.75rem 2rem;
    border-radius:12px;text-decoration:none;font-weight:600;
    transition:background 0.2s;
  }
  .btn-home:hover { background:#1d4ed8; }
</style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <p class="error-msg">The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn-home" href="/"><i class="bi bi-house-fill"></i>Go Home</a>
  </div>
</body>
</html>
